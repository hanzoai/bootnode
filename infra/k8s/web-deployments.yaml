# Bootnode web portals — one universal image, brand selected at runtime
# Each org gets its own deployment with brand-specific env vars
---
# ========== Hanzo Portal (web3.hanzo.ai) ==========
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bootnode-web-hanzo
  namespace: bootnode
  labels:
    app: bootnode-web-hanzo
    component: frontend
    brand: hanzo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bootnode-web-hanzo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bootnode-web-hanzo
        component: frontend
        brand: hanzo
    spec:
      containers:
        - name: web
          image: ghcr.io/hanzoai/bootnode-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_BRAND
              value: "hanzo"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.cloud.hanzo.ai"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://ws.cloud.hanzo.ai"
            - name: NEXT_PUBLIC_IAM_URL
              value: "https://hanzo.id"
            - name: NEXT_PUBLIC_IAM_CLIENT_ID
              value: "hanzo-web3"
            - name: NEXT_PUBLIC_IAM_DOMAIN
              value: "hanzo.id"
            - name: NEXT_PUBLIC_AUTH_MODE
              value: "iam"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: bootnode-web-hanzo
  namespace: bootnode
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3001
      targetPort: http
  selector:
    app: bootnode-web-hanzo
---
