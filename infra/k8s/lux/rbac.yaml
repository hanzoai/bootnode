---
apiVersion: v1
kind: Namespace
metadata:
  name: bootnode-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bootnode-operator
  namespace: bootnode-system
---
# The operator needs broad access to manage resources across namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bootnode-operator
rules:
  # CRD management
  - apiGroups: ["bootnode.dev"]
    resources: ["clusters", "clusters/status", "chaindeployments", "chaindeployments/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Core resources for fleet reconciliation
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "serviceaccounts", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  # StatefulSets and PDBs
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC for per-namespace service accounts
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events for status reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Coordination for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bootnode-operator
subjects:
  - kind: ServiceAccount
    name: bootnode-operator
    namespace: bootnode-system
roleRef:
  kind: ClusterRole
  name: bootnode-operator
  apiGroup: rbac.authorization.k8s.io
