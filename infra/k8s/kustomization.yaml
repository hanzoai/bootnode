apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bootnode

resources:
  - namespace.yaml
  - secrets.yaml
  - external-secrets.yaml
  - api-deployment.yaml
  - web-deployments.yaml
  - docs-deployment.yaml
  - indexer-deployment.yaml
  - ingress.yaml
  - monitoring.yaml
  - network-policies.yaml

commonLabels:
  app.kubernetes.io/part-of: bootnode
  app.kubernetes.io/managed-by: kustomize
