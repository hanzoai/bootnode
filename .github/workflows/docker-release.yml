# Deployment managed by hanzoai/universe — this workflow only builds and pushes images
name: Docker Release

on:
  # Only build after CI passes on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Tags build directly (release cuts)
  push:
    tags: ["v*"]
  # Manual override
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: only proceed if CI passed (skip check for tags/manual)
  gate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding with Docker build"

  # Build API image via standard Hanzo reusable workflow
  api:
    needs: gate
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/bootnode
      context: ./api
      dockerfile: Dockerfile
      platforms: "linux/amd64"
    secrets: inherit

  # Build Web image via standard Hanzo reusable workflow
  web:
    needs: gate
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/bootnode-web
      context: ./web
      dockerfile: Dockerfile
      platforms: "linux/amd64"
    secrets: inherit
